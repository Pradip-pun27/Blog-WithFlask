<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Arbitrary &amp; Thoughts{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1614;
            --ink-light: #2a2420;
            --parchment: #f5efe4;
            --parchment-dim: #e8e0d3;
            --gold: #b8943f;
            --gold-bright: #d4a745;
            --gold-dim: #8b6d2f;
            --rust: #9b4e2c;
            --sage: #7a8b6e;
            --cream: #faf7f2;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
            --rule: 1px solid rgba(184,148,63,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
            background-color: var(--ink);
            background-image:
                url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            min-height: 100vh;
            color: #3d3530;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 60px;
        }

        /* ── Masthead ── */
        .masthead {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
        }

        .masthead-mark {
            display: block;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 28px;
        }

        .masthead h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2.6rem, 6vw, 4rem);
            font-weight: 700;
            color: var(--parchment);
            letter-spacing: -0.02em;
            line-height: 1.1;
            font-style: italic;
        }

        .masthead h1 .amp {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            color: var(--gold);
        }

        .masthead-tagline {
            color: rgba(245,239,228,0.45);
            font-size: 1rem;
            font-style: italic;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* ── Nav ── */
        .nav {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .nav a {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(245,239,228,0.55);
            text-decoration: none;
            padding: 10px 22px;
            border: 1px solid rgba(184,148,63,0.25);
            transition: all 0.35s ease;
            position: relative;
        }

        .nav a::after {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid transparent;
            transition: border-color 0.35s ease;
        }

        .nav a:hover {
            color: var(--gold-bright);
            border-color: var(--gold);
        }

        .nav a:hover::after {
            border-color: rgba(184,148,63,0.15);
        }

        /* ── Page Layout ── */
        .page-layout {
            display: flex;
            gap: 36px;
            width: 100%;
            max-width: 1020px;
            align-items: flex-start;
        }

        .container {
            flex: 1;
            min-width: 0;
        }

        /* ── Author Sidebar ── */
        .author-sidebar {
            width: 260px;
            flex-shrink: 0;
            position: sticky;
            top: 40px;
            animation: cardIn 0.8s ease both;
        }

        .author-card {
            background: var(--ink-light);
            border: 1px solid rgba(184,148,63,0.15);
            padding: 32px 24px;
            text-align: center;
            transition: border-color 0.4s ease;
        }

        .author-card:hover {
            border-color: rgba(184,148,63,0.35);
        }

        .author-portrait {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(184,148,63,0.3);
            margin-bottom: 18px;
            filter: grayscale(20%) sepia(10%);
            transition: all 0.4s ease;
        }

        .author-card:hover .author-portrait {
            border-color: var(--gold);
            filter: grayscale(0%) sepia(0%);
        }

        .author-card .author-name {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--parchment);
            font-style: italic;
            margin-bottom: 4px;
        }

        .author-card .author-role {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gold-dim);
            margin-bottom: 20px;
        }

        .author-card .author-rule {
            border: none;
            border-top: 1px solid rgba(184,148,63,0.15);
            margin: 0 auto 20px;
            width: 50px;
        }

        .author-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .author-link {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            text-decoration: none;
            color: rgba(245,239,228,0.5);
            padding: 8px 14px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            letter-spacing: 0.04em;
        }

        .author-link:hover {
            color: var(--gold-bright);
            background: rgba(184,148,63,0.06);
            border-color: rgba(184,148,63,0.2);
        }

        .author-link-icon {
            width: 18px;
            text-align: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .author-link.email-link {
            font-size: 0.6rem;
        }

        /* ── Post Card ── */
        .post-card {
            background: var(--parchment);
            padding: 36px 40px;
            margin-bottom: 28px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: var(--shadow-sm);
            animation: cardIn 0.7s ease both;
        }

        .post-card:nth-child(1) { animation-delay: 0.05s; }
        .post-card:nth-child(2) { animation-delay: 0.15s; }
        .post-card:nth-child(3) { animation-delay: 0.25s; }
        .post-card:nth-child(4) { animation-delay: 0.35s; }
        .post-card:nth-child(5) { animation-delay: 0.45s; }
        .post-card:nth-child(6) { animation-delay: 0.55s; }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright), var(--gold-dim));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .post-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .post-card:hover::before {
            opacity: 1;
        }

        .post-card-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.65rem;
            font-weight: 600;
            line-height: 1.25;
            margin-bottom: 6px;
        }

        .post-card-title a {
            color: var(--ink);
            text-decoration: none;
            background: linear-gradient(to right, var(--gold), var(--gold-dim));
            background-size: 0% 1px;
            background-repeat: no-repeat;
            background-position: 0 100%;
            transition: background-size 0.4s ease;
        }

        .post-card-title a:hover {
            background-size: 100% 1px;
        }

        .post-card-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gold-dim);
            margin-bottom: 16px;
        }

        .post-card-excerpt {
            color: #5c5044;
            line-height: 1.75;
            font-size: 1.05rem;
            position: relative;
            padding-top: 14px;
        }

        .post-card-excerpt::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 40px;
            height: 1px;
            background: var(--gold-dim);
        }

        /* ── Single Post ── */
        .post-full {
            background: var(--parchment);
            padding: 50px 48px;
            box-shadow: var(--shadow-sm);
        }

        .post-full h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 700;
            color: var(--ink);
            line-height: 1.2;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .post-full .post-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gold-dim);
            margin-bottom: 28px;
        }

        .post-full .rule {
            border: none;
            border-top: var(--rule);
            margin: 28px 0;
        }

        .post-full .post-body {
            font-size: 1.15rem;
            line-height: 1.85;
            color: #3d3530;
        }

        .post-full .post-body p { margin-bottom: 1.2em; }

        .post-full .post-body p:first-child::first-letter {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 3.8em;
            float: left;
            line-height: 0.75;
            padding-right: 12px;
            padding-top: 6px;
            color: var(--gold);
            font-weight: 700;
            font-style: italic;
        }

        .back-link {
            display: inline-block;
            margin-top: 32px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(245,239,228,0.5);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-link:hover { color: var(--gold-bright); }

        /* ── Form ── */
        .form-card {
            background: var(--parchment);
            padding: 44px 48px;
            box-shadow: var(--shadow-sm);
            animation: cardIn 0.7s ease both;
        }

        .form-card h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 6px;
            font-style: italic;
        }

        .form-card .form-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gold-dim);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gold-dim);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 0;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.1rem;
            color: var(--ink);
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(0,0,0,0.15);
            transition: border-color 0.35s ease, padding-left 0.35s ease;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-bottom-color: var(--gold);
            padding-left: 8px;
        }

        .form-group textarea {
            min-height: 160px;
            line-height: 1.75;
        }

        .btn {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--parchment);
            background: var(--ink);
            border: 1px solid var(--ink);
            padding: 14px 36px;
            cursor: pointer;
            transition: all 0.35s ease;
            margin-top: 8px;
        }

        .btn:hover {
            background: transparent;
            color: var(--ink);
        }

        /* ── Empty State ── */
        .empty {
            text-align: center;
            padding: 80px 40px;
            color: rgba(245,239,228,0.4);
        }

        .empty h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem;
            font-style: italic;
            margin-bottom: 12px;
            color: rgba(245,239,228,0.5);
        }

        .empty a {
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        .empty a:hover { border-bottom-color: var(--gold); }

        /* ── Footer ── */
        .colophon {
            text-align: center;
            padding: 50px 20px;
            color: rgba(245,239,228,0.2);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 20px;
        }

        .colophon .colophon-mark {
            display: block;
            width: 30px;
            height: 1px;
            background: rgba(184,148,63,0.3);
            margin: 0 auto 14px;
        }

        /* ── Responsive ── */
        @media (max-width: 820px) {
            .page-layout {
                flex-direction: column;
                align-items: center;
            }

            .author-sidebar {
                width: 100%;
                max-width: 500px;
                position: static;
                order: -1;
            }

            .author-card {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 16px;
                text-align: left;
                padding: 20px 22px;
            }

            .author-portrait {
                width: 56px;
                height: 56px;
                margin-bottom: 0;
            }

            .author-card .author-name { font-size: 1rem; }
            .author-card .author-role { margin-bottom: 0; }

            .author-card .author-rule { display: none; }

            .author-links {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 4px;
                width: 100%;
                margin-top: 4px;
            }

            .author-link {
                font-size: 0.6rem;
                padding: 6px 10px;
                gap: 6px;
            }
        }

        @media (max-width: 600px) {
            .masthead { padding: 40px 16px 28px; }
            .masthead h1 { font-size: 2.2rem; }
            .nav a { padding: 8px 16px; font-size: 0.7rem; }
            .post-card { padding: 24px 22px; }
            .post-full { padding: 28px 22px; }
            .post-full .post-body p:first-child::first-letter { font-size: 2.8em; }
            .form-card { padding: 28px 22px; }
            .post-card-title { font-size: 1.35rem; }
            .author-links { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header class="masthead">
        <span class="masthead-mark"></span>
        <h1>Arbitrary <span class="amp">&amp;</span><br>Thoughts</h1>
        <p class="masthead-tagline">A journal of scattered reflections</p>
    </header>

    <nav class="nav">
        <a href="/">Index</a>
        <a href="/new">New Post</a>
    </nav>

    <div class="page-layout">
        <main class="container">
            {% block content %}{% endblock %}
        </main>

        <aside class="author-sidebar">
            <div class="author-card">
                <img src="{{ url_for('static', filename='elon.png') }}" alt="Pradip Pun Magar" class="author-portrait" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%232a2420%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%238b6d2f%22 font-family=%22serif%22 font-size=%2232%22%3EP%3C/text%3E%3C/svg%3E'">
                <div class="author-name">Pradip Pun Magar</div>
                <div class="author-role">Scribe &amp; Thinker</div>
                <hr class="author-rule">
                <div class="author-links">
                    <a href="https://github.com/Pradip-pun27" target="_blank" rel="noopener" class="author-link">
                        <span class="author-link-icon">&#x2197;</span> GitHub
                    </a>
                    <a href="https://x.com/PradipP90550439" target="_blank" rel="noopener" class="author-link">
                        <span class="author-link-icon">&#x2197;</span> X / Twitter
                    </a>
                    <a href="mailto:pradippoonmgr@gmail.com" class="author-link email-link">
                        <span class="author-link-icon">&#x2709;</span> pradippoonmgr@gmail.com
                    </a>
                </div>
            </div>
        </aside>
    </div>

    <footer class="colophon">
        <span class="colophon-mark"></span>
        Arbitrary &amp; Thoughts &mdash; MMXXVI
    </footer>

</body>
</html>
