{% extends "base.html" %}
{% block title %}New Post — Arbitrary &amp; Thoughts{% endblock %}
{% block content %}
    <div class="form-card">
        <h2>New Entry</h2>
        <p class="form-subtitle">Commit a thought to the record</p>
        <form method="POST">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="What is this thought called?" required>
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" placeholder="Spill your thoughts here..." required></textarea>
            </div>
            <button type="submit" class="btn">Publish</button>
        </form>
    </div>
{% endblock %}
